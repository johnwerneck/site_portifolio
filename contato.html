<!DOCTYPE html>

<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="John Werneck">

    <!-- A meta tag abaixo (viewport) é para deixar a página responsiva ao tamanho
    da tela do dispositivo com zoom inicial em 100% (1:1)
    - viewport - instrução sobre como dimensionar
    - width=device-width - largura em pixels da tela
    - initial-scale - sem zoom inicial (100%)
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Contato</title>

    <link rel="stylesheet" type="text/css" href="style.css">

    <!-- defer atrasa o carregamento do arquivo para evitar problemas 
     de ler/usar elementos antes da página ser carregada 
     -->
    <script src="script.js" defer></script>

</head>
<body class="background">
    <header class="conteudo">
        <nav class="menuPrincipal" aria-label="Menu principal">
            <ul class="listaMenuPrincipal">
                <li class="itemMenu comLink"><a href="index.html">Sobre mim</a></li>
                <li class="itemMenu comLink"><a href="formacao.html">Formação</a></li>
                <li class="itemMenu comLink"><a href="portfolio.html">Portifólio</a></li>
                <li class="itemMenu semLink">Contato</li>
            </ul>
        </nav>
    </header>

    <header class="conteudo" aria-label="Título de página">
        <h1 class="tituloPagina">
            Contato
        </h1>
    </header>

    <main class="conteudo corpoTexto" aria-label="Conteúdo da página">
        <section class="paragrafoCorpoTexto">
            <h2>Envie sua mensagem</h2>

            <!--Formulário para enviar mensagem para e-mail. Campos com 'required' + botão disabled força campo não nulo-->
            <form action="mailto:cadastrodecoisa@gmail.com" method="post" enctype="text/plain">
                <fieldset>
                    <legend>Contato</legend>
                    <p>
                        <label for="nome">Nome:</label>
                        <input class="formularioCampo" type="text" id="nome" name="nome" placeholder="Informe seu nome" required>
                    </p>
                    <p>
                        <label for="email">E-mail:</label>
                        <input class="formularioCampo"  type="email" id="email" name="email" placeholder="Exemplo: contato@email.com" required>
                    </p>
                    <p>
                        <label for="mensagem">Mensagem:</label>
                        <br>
                        <textarea class="formularioCampoMensagem" id="mensagem" name="mensagem" placeholder="Digite sua mensagem" required></textarea>
                    </p>
                </fieldset>
                
                <p>
                    <button class="formularioBotao" type="submit" id="botaoEnviar" onmouseover="enviarMsg()" onclick="confirmacaoMsg()">Enviar mensagem</button>
                </p>
            </form>
        </section>
    </main>

    <footer class="conteudo areaRodape" aria-label="Rodapé">
        <p>
            Trabalho de Fundamentos da Programação Web. Uninter 2026. John Werneck
        </p>
    </footer>
    
</body>
</html>
